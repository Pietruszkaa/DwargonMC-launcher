name: Windows Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build portable Windows launcher
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            launcher/package-lock.json
            sync-server/package-lock.json

      - name: Install launcher dependencies
        run: npm ci --prefix launcher

      - name: Repair Rollup optional dependency on Windows
        run: npm install --prefix launcher --no-save @rollup/rollup-win32-x64-msvc@4.61.0

      - name: Install sync-server dependencies
        run: npm ci --prefix sync-server

      - name: Typecheck
        run: npm run typecheck
        working-directory: launcher

      - name: Test
        run: npm test
        working-directory: launcher

      - name: Patch request dependency tree for electron-builder
        run: node scripts/patch-request-form-data.cjs
        working-directory: launcher

      - name: Build Windows portable
        run: npm run dist:win
        working-directory: launcher

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: dwargon-launcher-windows-portable
          path: launcher/release/*.exe
          if-no-files-found: error
