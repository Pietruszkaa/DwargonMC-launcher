<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DwargonMC Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080808;
        --panel: rgba(0, 0, 0, 0.72);
        --line: rgba(255, 255, 255, 0.18);
        --text: #f2f4f3;
        --muted: #9aa2a9;
        --good: #67d68a;
        --warn: #ffc857;
        --bad: #ff5252;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 32px;
      }

      p {
        color: var(--muted);
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 380px) minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      input,
      textarea,
      select,
      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: rgba(0, 0, 0, 0.42);
        color: var(--text);
        font: inherit;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 9px 11px;
        outline: none;
      }

      textarea {
        min-height: 520px;
        resize: vertical;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 13px;
        line-height: 1.45;
      }

      button {
        padding: 0 14px;
        cursor: pointer;
        font-weight: 800;
      }

      button:hover {
        border-color: rgba(255, 255, 255, 0.38);
      }

      button.primary {
        color: var(--good);
      }

      button.warn {
        color: var(--warn);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .two {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .editor-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 150px 150px;
        gap: 10px;
        align-items: end;
      }

      .small-editor {
        min-height: 160px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.36);
        padding: 12px;
      }

      .metric span {
        display: block;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 16px;
      }

      .metric.good strong {
        color: var(--good);
      }

      .metric.warn strong {
        color: var(--warn);
      }

      .metric.bad strong {
        color: var(--bad);
      }

      .status {
        min-height: 22px;
        color: var(--muted);
      }

      .status.good {
        color: var(--good);
      }

      .status.bad {
        color: var(--bad);
      }

      .preview {
        display: grid;
        gap: 10px;
      }

      .preview article {
        border-left: 3px solid var(--muted);
        background: rgba(0, 0, 0, 0.36);
        padding: 12px;
      }

      .preview article.warning,
      .preview article.maintenance {
        border-left-color: var(--warn);
      }

      .preview article.update,
      .preview article.info {
        border-left-color: var(--good);
      }

      .preview strong {
        display: block;
        margin-bottom: 5px;
      }

      @media (max-width: 840px) {
        header,
        .grid {
          grid-template-columns: 1fr;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>DwargonMC Admin</h1>
          <p>Edycja komunikatow launchera oraz publicznego server.json.</p>
        </div>
        <p id="status" class="status">Gotowy.</p>
      </header>

      <section class="grid">
        <aside class="panel stack">
          <label>
            Backend URL
            <input id="backendUrl" placeholder="https://dwargonmc-sync.petershub.xyz" />
          </label>
          <label>
            Admin token
            <input id="adminToken" type="password" autocomplete="current-password" />
          </label>
          <div class="actions">
            <button id="loadButton" type="button">Pobierz</button>
            <button id="saveButton" class="primary" type="button">Zapisz</button>
            <button id="formatButton" class="warn" type="button">Formatuj</button>
            <button id="saveServerButton" class="primary" type="button">Zapisz server.json</button>
            <button id="overviewButton" type="button">Odśwież status</button>
            <button id="mapButton" type="button">Mapa</button>
          </div>
          <div class="panel stack">
            <h2>Status</h2>
            <div class="cards">
              <div id="backendMetric" class="metric">
                <span>Backend</span>
                <strong>--</strong>
              </div>
              <div id="mcMetric" class="metric">
                <span>Minecraft</span>
                <strong>--</strong>
              </div>
              <div id="manifestMetric" class="metric">
                <span>Manifest</span>
                <strong>--</strong>
              </div>
              <div id="backgroundMetric" class="metric">
                <span>Tła</span>
                <strong>--</strong>
              </div>
              <div id="playersMetric" class="metric">
                <span>Gracze</span>
                <strong>--</strong>
              </div>
              <div id="mapMetric" class="metric">
                <span>Mapa</span>
                <strong>--</strong>
              </div>
            </div>
          </div>
          <div class="panel">
            <h2>Podglad</h2>
            <div id="preview" class="preview"></div>
          </div>
        </aside>

        <section class="panel stack">
          <div class="panel stack">
            <h2>server.json</h2>
            <div class="two">
              <label>
                Nazwa serwera
                <input id="serverName" placeholder="DwargonMC" />
              </label>
              <label>
                Adres MC
                <input id="mcAddress" placeholder="dwargonmc.playit.plus" />
              </label>
              <label>
                Wersja MC
                <input id="mcVersion" placeholder="1.21.1" />
              </label>
              <label>
                Loader
                <select id="mcLoader">
                  <option value="neoforge">NeoForge</option>
                  <option value="vanilla">Vanilla</option>
                </select>
              </label>
              <label>
                Wersja loadera
                <input id="mcLoaderVersion" placeholder="latest albo 21.1.230" />
              </label>
              <label>
                Hasło wymagane
                <select id="authRequired">
                  <option value="false">Nie</option>
                  <option value="true">Tak</option>
                </select>
              </label>
            </div>
          </div>

          <div class="panel stack">
            <h2>Komunikaty</h2>
            <div class="editor-row">
              <label>
                Tytuł
                <input id="messageTitle" placeholder="DwargonMC" />
              </label>
              <label>
                Typ
                <select id="messageLevel">
                  <option value="info">Info</option>
                  <option value="warning">Ostrzeżenie</option>
                  <option value="maintenance">Przerwa</option>
                  <option value="update">Update</option>
                </select>
              </label>
              <button id="addMessageButton" type="button">Dodaj</button>
            </div>
            <label>
              Treść
              <textarea id="messageBody" class="small-editor" spellcheck="true"></textarea>
            </label>
            <label>
              Link opcjonalny
              <input id="messageLink" placeholder="https://..." />
            </label>
            <label>
              announcements.json
              <textarea id="editor" spellcheck="false"></textarea>
            </label>
          </div>
        </section>
      </section>
    </main>

    <script>
      const backendUrlInput = document.querySelector('#backendUrl');
      const adminTokenInput = document.querySelector('#adminToken');
      const editor = document.querySelector('#editor');
      const serverNameInput = document.querySelector('#serverName');
      const mcAddressInput = document.querySelector('#mcAddress');
      const mcVersionInput = document.querySelector('#mcVersion');
      const mcLoaderInput = document.querySelector('#mcLoader');
      const mcLoaderVersionInput = document.querySelector('#mcLoaderVersion');
      const authRequiredInput = document.querySelector('#authRequired');
      const messageTitleInput = document.querySelector('#messageTitle');
      const messageLevelInput = document.querySelector('#messageLevel');
      const messageBodyInput = document.querySelector('#messageBody');
      const messageLinkInput = document.querySelector('#messageLink');
      const preview = document.querySelector('#preview');
      const status = document.querySelector('#status');
      const metrics = {
        backend: document.querySelector('#backendMetric'),
        mc: document.querySelector('#mcMetric'),
        manifest: document.querySelector('#manifestMetric'),
        backgrounds: document.querySelector('#backgroundMetric'),
        players: document.querySelector('#playersMetric'),
        map: document.querySelector('#mapMetric')
      };

      backendUrlInput.value = localStorage.getItem('dwargonAdminBackendUrl') || 'https://dwargonmc-sync.petershub.xyz';
      editor.value = JSON.stringify(
        {
          items: [
            {
              id: 'welcome',
              title: 'DwargonMC',
              body: 'Komunikat widoczny w launcherze.',
              level: 'info',
              date: new Date().toISOString(),
              link: null,
              expiresAt: null
            }
          ]
        },
        null,
        2
      );

      document.querySelector('#loadButton').addEventListener('click', loadAll);
      document.querySelector('#saveButton').addEventListener('click', saveAnnouncements);
      document.querySelector('#saveServerButton').addEventListener('click', saveServerInfo);
      document.querySelector('#formatButton').addEventListener('click', formatJson);
      document.querySelector('#addMessageButton').addEventListener('click', addMessage);
      document.querySelector('#overviewButton').addEventListener('click', refreshOverview);
      document.querySelector('#mapButton').addEventListener('click', () => {
        window.open(`${backendBase()}/map/`, '_blank', 'noopener');
      });
      editor.addEventListener('input', renderPreview);

      renderPreview();
      refreshOverview();

      async function loadAll() {
        await Promise.all([loadAnnouncements(), loadServerInfo()]);
      }

      async function loadAnnouncements() {
        saveLocalConfig();
        setStatus('Pobieranie...', '');

        try {
          const response = await fetch(`${backendBase()}/announcements.json`, {
            headers: {
              Accept: 'application/json'
            }
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          editor.value = JSON.stringify(payload, null, 2);
          renderPreview();
          setStatus('Pobrano komunikaty.', 'good');
        } catch (error) {
          setStatus(`Blad pobierania: ${error.message}`, 'bad');
        }
      }

      async function loadServerInfo() {
        try {
          const server = await fetchJson('/server.json');
          serverNameInput.value = server.name || '';
          mcAddressInput.value = server.minecraft?.address || '';
          mcVersionInput.value = server.minecraft?.version || '1.21.1';
          mcLoaderInput.value = server.minecraft?.loader || 'neoforge';
          mcLoaderVersionInput.value = server.minecraft?.loaderVersion || 'latest';
          authRequiredInput.value = server.auth?.required ? 'true' : 'false';
          setStatus('Pobrano server.json.', 'good');
        } catch (error) {
          setStatus(`Blad server.json: ${error.message}`, 'bad');
        }
      }

      async function refreshOverview() {
        saveLocalConfig();
        setStatus('Odświeżanie statusu...', '');

        await Promise.all([refreshHealth(), refreshManifest(), refreshMap()]);
        setStatus('Status odświeżony.', 'good');
      }

      async function refreshHealth() {
        try {
          const health = await fetchJson('/health');
          setMetric(metrics.backend, 'online', 'good');
          setMetric(metrics.mc, health.serverOnline ? 'online' : 'offline', health.serverOnline ? 'good' : 'bad');
          setMetric(metrics.players, playerSummary(health), health.serverOnline ? 'good' : 'warn');
        } catch (error) {
          setMetric(metrics.backend, 'offline', 'bad');
          setMetric(metrics.mc, '--', 'bad');
          setMetric(metrics.players, '--', 'bad');
        }
      }

      async function refreshManifest() {
        try {
          const manifest = await fetchJson('/manifest.json');
          const files = Array.isArray(manifest.files) ? manifest.files.length : 0;
          const backgrounds = Array.isArray(manifest.backgrounds) ? manifest.backgrounds.length : 0;
          setMetric(metrics.manifest, `${files} plików`, files > 0 ? 'good' : 'warn');
          setMetric(metrics.backgrounds, `${backgrounds} teł`, backgrounds > 0 ? 'good' : 'warn');
        } catch {
          setMetric(metrics.manifest, 'brak', 'bad');
          setMetric(metrics.backgrounds, '--', 'bad');
        }
      }

      async function refreshMap() {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), 3500);

        try {
          const response = await fetch(`${backendBase()}/map/`, {
            headers: { Accept: 'text/html,application/json' },
            signal: controller.signal
          });
          setMetric(metrics.map, response.ok ? 'online' : `HTTP ${response.status}`, response.ok ? 'good' : 'bad');
        } catch {
          setMetric(metrics.map, 'offline', 'bad');
        } finally {
          window.clearTimeout(timer);
        }
      }

      async function fetchJson(path) {
        const response = await fetch(`${backendBase()}${path}`, {
          headers: {
            Accept: 'application/json'
          }
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.message || `HTTP ${response.status}`);
        return payload;
      }

      async function saveAnnouncements() {
        saveLocalConfig();
        setStatus('Zapisywanie...', '');

        let payload;
        try {
          payload = JSON.parse(editor.value);
        } catch (error) {
          setStatus(`Niepoprawny JSON: ${error.message}`, 'bad');
          return;
        }

        try {
          const response = await fetch(`${backendBase()}/admin/announcements.json`, {
            method: 'PUT',
            headers: adminHeaders({
              Accept: 'application/json',
              'Content-Type': 'application/json'
            }),
            body: JSON.stringify(payload)
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(result.message || `HTTP ${response.status}`);
          editor.value = JSON.stringify(result, null, 2);
          renderPreview();
          setStatus('Zapisano komunikaty.', 'good');
        } catch (error) {
          setStatus(`Blad zapisu: ${error.message}`, 'bad');
        }
      }

      async function saveServerInfo() {
        saveLocalConfig();
        const payload = {
          name: serverNameInput.value.trim(),
          minecraft: {
            address: mcAddressInput.value.trim() || null,
            version: mcVersionInput.value.trim() || '1.21.1',
            loader: mcLoaderInput.value,
            loaderVersion: mcLoaderVersionInput.value.trim() || 'latest'
          },
          auth: {
            required: authRequiredInput.value === 'true',
            type: authRequiredInput.value === 'true' ? 'password' : null
          }
        };

        try {
          const response = await fetch(`${backendBase()}/admin/server.json`, {
            method: 'PUT',
            headers: adminHeaders({
              Accept: 'application/json',
              'Content-Type': 'application/json'
            }),
            body: JSON.stringify(payload)
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(result.message || `HTTP ${response.status}`);
          setStatus('Zapisano server.json.', 'good');
          await loadServerInfo();
        } catch (error) {
          setStatus(`Blad zapisu server.json: ${error.message}`, 'bad');
        }
      }

      function addMessage() {
        let payload;
        try {
          payload = JSON.parse(editor.value);
        } catch (error) {
          setStatus(`Niepoprawny JSON: ${error.message}`, 'bad');
          return;
        }

        if (!Array.isArray(payload.items)) payload.items = [];
        const title = messageTitleInput.value.trim();
        const body = messageBodyInput.value.trim();
        if (!title || !body) {
          setStatus('Tytul i tresc komunikatu sa wymagane.', 'bad');
          return;
        }

        payload.items.unshift({
          id: stableId(title, body),
          title,
          body,
          level: messageLevelInput.value,
          date: new Date().toISOString(),
          link: messageLinkInput.value.trim() || null,
          expiresAt: null
        });
        editor.value = JSON.stringify(payload, null, 2);
        messageTitleInput.value = '';
        messageBodyInput.value = '';
        messageLinkInput.value = '';
        renderPreview();
        setStatus('Dodano komunikat lokalnie. Uzyj Zapisz.', 'good');
      }

      function formatJson() {
        try {
          editor.value = JSON.stringify(JSON.parse(editor.value), null, 2);
          renderPreview();
          setStatus('Sformatowano JSON.', 'good');
        } catch (error) {
          setStatus(`Niepoprawny JSON: ${error.message}`, 'bad');
        }
      }

      function renderPreview() {
        preview.textContent = '';

        let payload;
        try {
          payload = JSON.parse(editor.value);
        } catch {
          preview.textContent = 'JSON wymaga poprawy.';
          return;
        }

        const items = Array.isArray(payload.items) ? payload.items : [];
        if (!items.length) {
          preview.textContent = 'Brak komunikatow.';
          return;
        }

        for (const item of items.slice(0, 6)) {
          const article = document.createElement('article');
          article.className = item.level || 'info';
          article.innerHTML = `<strong></strong><p></p>`;
          article.querySelector('strong').textContent = item.title || '(bez tytulu)';
          article.querySelector('p').textContent = item.body || '';
          preview.append(article);
        }
      }

      function backendBase() {
        return backendUrlInput.value.trim().replace(/\/+$/, '');
      }

      function adminHeaders(base) {
        const token = adminTokenInput.value.trim();
        return token ? { ...base, Authorization: `Bearer ${token}` } : base;
      }

      function stableId(title, body) {
        return `${title}:${body}`.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 80);
      }

      function saveLocalConfig() {
        localStorage.setItem('dwargonAdminBackendUrl', backendBase());
      }

      function playerSummary(health) {
        const online = health.playersOnline ?? (Array.isArray(health.players) ? health.players.length : null);
        const max = health.playersMax ?? '--';
        return online === null ? '--' : `${online}/${max}`;
      }

      function setMetric(element, value, kind) {
        element.className = `metric ${kind || ''}`;
        element.querySelector('strong').textContent = value;
      }

      function setStatus(message, kind) {
        status.textContent = message;
        status.className = `status ${kind || ''}`;
      }
    </script>
  </body>
</html>
