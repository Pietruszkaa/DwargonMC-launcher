services:
  sync-server:
    image: node:22-alpine
    container_name: dwargonmc-sync-server
    restart: unless-stopped
    working_dir: /data
    network_mode: host
    environment:
      PORT: "${SYNC_PORT:-2121}"
      BIND_HOST: "${SYNC_BIND_HOST:-0.0.0.0}"
      PUBLIC_URL: "${PUBLIC_URL:-http://127.0.0.1:2121}"
      MAP_TARGET: "${MAP_TARGET:-http://127.0.0.1:8888}"
      MC_HOST: "${MC_HOST:-127.0.0.1}"
      MC_PORT: "${MC_PORT:-25565}"
      MC_ADDRESS: "${MC_ADDRESS:-}"
      MC_VERSION: "${MC_VERSION:-1.21.1}"
      MC_LOADER: "${MC_LOADER:-neoforge}"
      MC_LOADER_VERSION: "${MC_LOADER_VERSION:-latest}"
      SERVER_PASSWORD: "${SERVER_PASSWORD:-}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      MAP_ACCESS_CLIENT_ID: "${MAP_ACCESS_CLIENT_ID:-}"
      MAP_ACCESS_CLIENT_SECRET: "${MAP_ACCESS_CLIENT_SECRET:-}"
      MAP_REQUEST_HEADERS: "${MAP_REQUEST_HEADERS:-}"
    volumes:
      - ${DWARGONMC_ROOT:-.}/sync-server:/data
      - sync-server-node-modules:/data/node_modules
    command:
      - sh
      - -lc
      - |
        set -e
        test -f package.json
        test -f server.js
        npm ci --omit=dev
        mkdir -p files backgrounds
        [ -f announcements.json ] || printf '{"items":[]}\n' > announcements.json
        exec node server.js /data

  admin-site:
    image: nginx:1.27-alpine
    container_name: dwargonmc-admin-site
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DWARGONMC_ROOT:-.}/admin-site:/usr/share/nginx/html:ro
    command:
      - sh
      - -lc
      - |
        sed -i 's/listen       80;/listen       8082;/' /etc/nginx/conf.d/default.conf
        sed -i 's/listen  \[::\]:80;/listen  [::]:8082;/' /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'

volumes:
  sync-server-node-modules: null
