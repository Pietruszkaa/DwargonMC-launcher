services:
  sync-server:
    image: node:22-alpine
    container_name: dwargonmc-sync-server
    restart: unless-stopped
    working_dir: /data
    ports:
      - "${SYNC_PORT:-2121}:${SYNC_PORT:-2121}"
    environment:
      PORT: "${SYNC_PORT:-2121}"
      BIND_HOST: "${SYNC_BIND_HOST:-0.0.0.0}"
      PUBLIC_URL: "${PUBLIC_URL:-http://127.0.0.1:2121}"
      MAP_TARGET: "${MAP_TARGET:-http://host.docker.internal:8888}"
      MC_HOST: "${MC_HOST:-host.docker.internal}"
      MC_PORT: "${MC_PORT:-25565}"
      MC_ADDRESS: "${MC_ADDRESS:-}"
      MC_VERSION: "${MC_VERSION:-1.21.1}"
      MC_LOADER: "${MC_LOADER:-neoforge}"
      MC_LOADER_VERSION: "${MC_LOADER_VERSION:-latest}"
      SERVER_PASSWORD: "${SERVER_PASSWORD:-}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      MAP_ACCESS_CLIENT_ID: "${MAP_ACCESS_CLIENT_ID:-}"
      MAP_ACCESS_CLIENT_SECRET: "${MAP_ACCESS_CLIENT_SECRET:-}"
      MAP_REQUEST_HEADERS: "${MAP_REQUEST_HEADERS:-}"
    volumes:
      - ${SYNC_SERVER_ROOT:-.}:/data
      - node-modules:/data/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -lc
      - |
        set -e
        test -f package.json
        test -f package-lock.json
        test -f server.js
        npm ci --omit=dev
        mkdir -p files backgrounds
        [ -f announcements.json ] || printf '{"items":[]}\n' > announcements.json
        exec node server.js /data

volumes:
  node-modules: null
