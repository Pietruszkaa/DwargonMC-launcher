name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Build and publish Windows portable
    runs-on: windows-2025
    needs: windows
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Repair Rollup optional dependency on Windows
        run: npm install --prefix launcher --no-save @rollup/rollup-win32-x64-msvc@4.61.0

      - name: Typecheck
        run: npm run launcher:typecheck

      - name: Test
        run: npm run launcher:test

      - name: Apply tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: node .github/scripts/apply-release-version.mjs


      - name: Debug request dependency
        shell: pwsh
        run: |
          Write-Host "Launcher request package:"
          if (Test-Path "launcher/node_modules/request/package.json") {
            Get-Content "launcher/node_modules/request/package.json" | Select-String "form-data"
          } else {
            Write-Host "launcher/node_modules/request/package.json not found"
          }

          Write-Host "Root request package:"
          if (Test-Path "node_modules/request/package.json") {
            Get-Content "node_modules/request/package.json" | Select-String "form-data"
          } else {
            Write-Host "node_modules/request/package.json not found"
          }

          Write-Host "Nested form-data:"
          Get-ChildItem -Recurse -Path . -Filter package.json |
            Where-Object { $_.FullName -like "*request*form-data*package.json" } |
            ForEach-Object {
              Write-Host $_.FullName
              Get-Content $_.FullName | Select-String '"version"'
            }

      - name: Patch request dependency tree for electron-builder
        run: node launcher/scripts/patch-request-form-data.cjs

      - name: Build Windows portable
        run: npm run launcher:dist:win

      - name: Generate SHA256
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path launcher/release -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) {
            throw "No release exe found in launcher/release"
          }

          $hash = (Get-FileHash -Algorithm SHA256 -Path $exe.FullName).Hash.ToLowerInvariant()
          "$hash  $($exe.Name)" | Set-Content -Encoding ascii -Path launcher/release/SHA256SUMS.txt
          "DWARGONMC_RELEASE_EXE=$($exe.FullName)" | Out-File -Encoding utf8 -Append $env:GITHUB_ENV

      - name: Scan portable exe with VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          VIRUSTOTAL_NOTES_FILE: launcher/release/VIRUSTOTAL.md
        run: node .github/scripts/virustotal-upload.mjs

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $exe = $env:DWARGONMC_RELEASE_EXE
          $sha = "launcher/release/SHA256SUMS.txt"
          $notes = "Automatyczny build Windows portable."

          if (Test-Path "launcher/release/VIRUSTOTAL.md") {
            $vtNotes = Get-Content -Raw -Path "launcher/release/VIRUSTOTAL.md"
            $notes = "$notes`n`n$vtNotes"
          }

          $notes | Set-Content -Encoding utf8 -Path "launcher/release/RELEASE_NOTES.md"

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Dwargon Launcher $tag" --notes-file "launcher/release/RELEASE_NOTES.md"
          } else {
            gh release edit $tag --notes-file "launcher/release/RELEASE_NOTES.md"
          }

          gh release upload $tag $exe $sha --clobber

  linux:
    name: Build and publish Linux tar.gz
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run launcher:typecheck

      - name: Test
        run: npm run launcher:test

      - name: Apply tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: node .github/scripts/apply-release-version.mjs

      - name: Build Linux tar.gz
        run: npm run launcher:dist:linux

      - name: Generate SHA256
        run: |
          tarball="$(find launcher/release -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$tarball" ]; then
            echo "No Linux tar.gz found in launcher/release" >&2
            exit 1
          fi

          hash="$(sha256sum "$tarball" | awk '{print $1}')"
          file_name="$(basename "$tarball")"
          printf '%s  %s\n' "$hash" "$file_name" > launcher/release/SHA256SUMS-linux.txt
          {
            echo "DWARGONMC_RELEASE_TAR=$tarball"
            echo "DWARGONMC_RELEASE_TAR_NAME=$file_name"
          } >> "$GITHUB_ENV"

      - name: Publish GitHub Release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$GITHUB_REF_NAME"
          tarball="$DWARGONMC_RELEASE_TAR"
          sha="launcher/release/SHA256SUMS-linux.txt"

          gh release upload "$tag" "$tarball" "$sha" --clobber
