name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Build and publish Windows portable
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            launcher/package-lock.json
            sync-server/package-lock.json

      - name: Install launcher dependencies
        run: npm ci --prefix launcher

      - name: Install sync-server dependencies
        run: npm ci --prefix sync-server

      - name: Typecheck
        run: npm run typecheck
        working-directory: launcher

      - name: Test
        run: npm test
        working-directory: launcher

      - name: Apply tag version to launcher package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            throw "Tag $env:GITHUB_REF_NAME is not a supported semver version."
          }

          $packageFile = "launcher/package.json"
          $package = Get-Content -Raw -Path $packageFile | ConvertFrom-Json
          $package.version = $version
          $package | ConvertTo-Json -Depth 20 | Set-Content -Encoding utf8 -Path $packageFile

          "DWARGONMC_RELEASE_VERSION=$version" | Out-File -Encoding utf8 -Append $env:GITHUB_ENV
          Write-Host "Launcher package version set to $version from tag $env:GITHUB_REF_NAME"

      - name: Build Windows portable
        run: npm run dist:win
        working-directory: launcher

      - name: Generate SHA256
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path launcher/release -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) {
            throw "No release exe found in launcher/release"
          }

          $hash = (Get-FileHash -Algorithm SHA256 -Path $exe.FullName).Hash.ToLowerInvariant()
          "$hash  $($exe.Name)" | Set-Content -Encoding ascii -Path launcher/release/SHA256SUMS.txt
          "DWARGONMC_RELEASE_EXE=$($exe.FullName)" | Out-File -Encoding utf8 -Append $env:GITHUB_ENV

      - name: Scan portable exe with VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          VIRUSTOTAL_NOTES_FILE: launcher/release/VIRUSTOTAL.md
        run: node .github/scripts/virustotal-upload.mjs

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $exe = $env:DWARGONMC_RELEASE_EXE
          $sha = "launcher/release/SHA256SUMS.txt"
          $notes = "Automatyczny build Windows portable."

          if (Test-Path "launcher/release/VIRUSTOTAL.md") {
            $vtNotes = Get-Content -Raw -Path "launcher/release/VIRUSTOTAL.md"
            $notes = "$notes`n`n$vtNotes"
          }

          $notes | Set-Content -Encoding utf8 -Path "launcher/release/RELEASE_NOTES.md"

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "DwargonMC Launcher $tag" --notes-file "launcher/release/RELEASE_NOTES.md"
          } else {
            gh release edit $tag --notes-file "launcher/release/RELEASE_NOTES.md"
          }

          gh release upload $tag $exe $sha --clobber
